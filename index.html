<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fast Food Tycoon 98 - Expansion Pack</title>
<style>
/* ===================== RESET & BASE (estilo Windows 95) ===================== */
* { box-sizing: border-box; }
html,body{
  margin:0; padding:0; height:100%;
  background:#008080; /* clássico teal desktop do Win95 */
  font-family:'MS Sans Serif', 'Tahoma', 'Pixelated MS Sans Serif', sans-serif;
  font-size:12px; color:#000; overflow:hidden;
  image-rendering:pixelated;
}
#desktop{
  position:relative; width:100%; height:100vh; overflow:hidden;
  background:
    radial-gradient(circle at 10% 10%, rgba(255,255,255,0.05), transparent 40%),
    repeating-linear-gradient(0deg, #017f7f 0 2px, #008080 2px 4px);
}

/* Bevel util classes (relevo Win95) */
.raised{
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #000; border-bottom:2px solid #000;
  box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #808080;
  background:#c0c0c0;
}
.sunken{
  border-top:2px solid #000; border-left:2px solid #000;
  border-right:2px solid #fff; border-bottom:2px solid #fff;
  box-shadow: inset 1px 1px 0 #808080, inset -1px -1px 0 #dfdfdf;
  background:#c0c0c0;
}
button.win95, .btn95{
  font-family:inherit; font-size:12px; background:#c0c0c0;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #000; border-bottom:2px solid #000;
  padding:4px 10px; cursor:pointer; color:#000;
}
button.win95:active, .btn95:active{
  border-top:2px solid #000; border-left:2px solid #000;
  border-right:2px solid #fff; border-bottom:2px solid #fff;
  padding:5px 9px 3px 11px;
}
button.win95:disabled{ color:#808080; cursor:default; }
input.win95, select.win95{
  font-family:inherit; font-size:12px; padding:2px 4px;
  border-top:2px solid #000; border-left:2px solid #000;
  border-right:2px solid #fff; border-bottom:2px solid #fff;
  background:#fff;
}

/* ===================== TOPBAR ===================== */
#topbar{
  position:absolute; top:0; left:0; right:0; height:46px;
  background:#c0c0c0; z-index:5000;
  border-bottom:2px solid #000;
  display:flex; align-items:center; gap:14px; padding:0 10px;
  font-size:11px;
}
#topbar .stat{ display:flex; flex-direction:column; line-height:12px; padding:2px 6px; }
#topbar .stat b{ font-size:12px; }
#topbar .stat span.label{ color:#404040; font-size:10px; }
#topbar .sep{ width:2px; height:30px; border-left:1px solid #808080; border-right:1px solid #fff; }
#topbar .spacer{ flex:1; }
#speedGroup button{ min-width:26px; }
#speedGroup button.active{
  border-top:2px solid #000; border-left:2px solid #000;
  border-right:2px solid #fff; border-bottom:2px solid #fff;
  background:#a0a0a0;
}

/* ===================== TASKBAR ===================== */
#taskbar{
  position:absolute; bottom:0; left:0; right:0; height:34px;
  background:#c0c0c0; border-top:2px solid #fff;
  display:flex; align-items:center; gap:4px; padding:2px 4px; z-index:5000;
  overflow-x:auto;
}
#startBtn{ font-weight:bold; padding:4px 12px; }
.taskbtn{ font-size:11px; padding:4px 8px; min-width:90px; text-align:left; }
.taskbtn.active{
  border-top:2px solid #000; border-left:2px solid #000;
  border-right:2px solid #fff; border-bottom:2px solid #fff;
}
#clock{ margin-left:auto; padding:4px 10px; font-size:11px; }

/* ===================== JANELAS ===================== */
.window{
  position:absolute; background:#c0c0c0; min-width:280px;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #000; border-bottom:2px solid #000;
  box-shadow:2px 2px 8px rgba(0,0,0,0.5);
  display:flex; flex-direction:column; z-index:10;
}
.titlebar{
  background:linear-gradient(90deg,#000080,#1084d0);
  color:#fff; font-weight:bold; font-size:12px;
  padding:3px 4px; display:flex; align-items:center; cursor:move;
  user-select:none;
}
.titlebar .ticon{ margin-right:5px; }
.titlebar .tclose{
  margin-left:auto; background:#c0c0c0; color:#000; width:16px; height:14px;
  font-size:10px; line-height:12px; text-align:center; cursor:pointer;
  border-top:1px solid #fff; border-left:1px solid #fff;
  border-right:1px solid #000; border-bottom:1px solid #000;
}
.win-body{ padding:8px; overflow-y:auto; flex:1; font-size:12px; }
.win-body h3{ margin:4px 0 6px; font-size:13px; border-bottom:1px solid #808080; padding-bottom:2px;}
table.data{ width:100%; border-collapse:collapse; font-size:11px; }
table.data th, table.data td{ border:1px solid #808080; padding:3px 5px; text-align:left; }
table.data th{ background:#a0a0a0; }
.row{ display:flex; align-items:center; gap:6px; margin:4px 0; }
.bar-outer{ width:100%; height:10px; background:#fff; border:1px solid #000; }
.bar-inner{ height:100%; background:#008000; }
.tag{ display:inline-block; padding:1px 5px; background:#000080; color:#fff; font-size:10px; border-radius:0;}
.badge-ok{ color:#006400; font-weight:bold; }
.badge-bad{ color:#a00000; font-weight:bold; }
.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.card{ border:1px solid #808080; background:#d8d8d8; padding:6px; margin-bottom:6px; }
.small{ font-size:10px; color:#404040; }
#logbox{ height:110px; overflow-y:auto; background:#fff; border:1px solid #000; padding:4px; font-size:11px; }
#logbox div{ border-bottom:1px dotted #ccc; padding:1px 0; }
canvas.chart{ background:#fff; border:1px solid #000; }
.icon-desktop{
  position:absolute; width:70px; text-align:center; color:#fff; font-size:11px;
  text-shadow:1px 1px 1px #000; cursor:pointer; user-select:none;
}
.icon-desktop .box{
  width:40px; height:36px; margin:0 auto 4px; background:#c0c0c0;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #000; border-bottom:2px solid #000;
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
#startMenu{
  position:absolute; bottom:34px; left:0; width:200px; background:#c0c0c0;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-right:2px solid #000; border-bottom:2px solid #000;
  z-index:6000; display:none; flex-direction:column; padding:4px;
}
#startMenu button{ text-align:left; padding:6px 8px; }
.toast{
  position:absolute; top:52px; right:10px; background:#ffffe1; border:1px solid #000;
  padding:6px 10px; font-size:11px; box-shadow:2px 2px 4px rgba(0,0,0,0.4); z-index:9000;
  max-width:260px;
}

/* ===================== EXPANSÃO WIN98 — novos estilos ===================== */
.newspaper{ font-family:'Georgia','Times New Roman',serif; background:#f2ead9; border:1px solid #000; padding:8px; }
.newspaper h4{ margin:0 0 2px; font-size:15px; border-bottom:2px solid #000; padding-bottom:2px; }
.newspaper .headline{ font-weight:bold; font-size:12px; margin-top:8px; }
.newspaper .byline{ font-size:10px; color:#555; font-style:italic; }
.comm-item{ border:1px solid #808080; background:#fffef0; padding:6px; margin-bottom:6px; }
.comm-item .ttag{ font-size:10px; padding:1px 5px; background:#800000; color:#fff; margin-right:4px; }
.progressbar-outer{ width:100%; height:22px; background:#fff; border:2px inset #808080; padding:2px; }
.progressbar-inner{ height:100%; background:repeating-linear-gradient(90deg,#000080 0 8px,#1084d0 8px 16px); width:0%; transition:width .15s linear; }
.paper-report{ background:#fdfdf5; border:1px solid #999; box-shadow:3px 3px 6px rgba(0,0,0,0.4); padding:14px; font-family:'Courier New',monospace; font-size:11px; }
.paper-report h3{ text-align:center; border-bottom:2px double #000; }
.rank-row{ display:flex; justify-content:space-between; padding:3px 4px; border-bottom:1px dotted #999; }
.rank-row.me{ background:#ffe9a8; font-weight:bold; }
.minigame-area{ background:#fff; border:2px inset #808080; height:180px; position:relative; overflow:hidden; }
.minigame-target{ position:absolute; width:36px; height:36px; font-size:26px; cursor:pointer; user-select:none; }
#soundToggle{ font-size:14px; padding:4px 8px; }
.doc-item{ display:flex; align-items:center; gap:6px; padding:4px; cursor:pointer; }
.doc-item:hover{ background:#000080; color:#fff; }
.doc-item .dicon{ font-size:18px; }
.locked-city{ opacity:0.55; }
</style>
</head>
<body>
<div id="desktop">

  <div id="topbar">
    <div class="stat"><span class="label">Dinheiro</span><b id="statMoney">$0</b></div>
    <div class="sep"></div>

    <div class="sep"></div>

  <div id="deskIcons"></div>

  <div id="windowsLayer"></div>

  <div id="taskbar">

    <button class="win95" data-open="restaurant">🏪 Restaurante</button>

    <button class="win95" data-open="inventory">📦 Estoque</button>
    <button class="win95" data-open="marketing">📣 Marketing</button>
    <button class="win95" data-open="research">🔬 Pesquisa</button>
    <button class="win95" data-open="finances">💰 Finanças</button>
    <button class="win95" data-open="expansion">🗺️ Expansão</button>
    <button class="win95" data-open="competitors">🏁 Concorrentes</button>
    <button class="win95" data-open="achievements">🏆 Conquistas</button>
    <hr style="width:100%; border:1px solid #808080;">
    <button class="win95" data-open="communication">📞 Central de Comunicação</button>
    <button class="win95" data-open="newspaper">📰 Jornal da Cidade</button>
    <button class="win95" data-open="market">🏆 Ranking Empresarial</button>
    <button class="win95" data-open="documents">📁 Meus Documentos</button>
    <button class="win95" data-open="printer">🖨️ Impressora</button>
    <button class="win95" data-open="cdrom">💿 CD-ROM de Expansões</button>
    <button class="win95" data-open="reports">📊 Relatórios</button>
    <button class="win95" data-open="minigames">🎮 Mini-jogos</button>
  </div>

</div>

<script>
/* ============================================================================
   FAST FOOD TYCOON 95
   Jogo completo em HTML/CSS/JS puro, sem frameworks e sem dependencias externas.
   NOTA IMPORTANTE SOBRE SALVAMENTO:
   Artifacts do Claude nao permitem localStorage/sessionStorage no navegador.
   Por isso o "salvamento automatico" foi substituido por um sistema robusto de
   Exportar/Importar em arquivo JSON (botoes Salvar/Carregar na barra superior),
   que cumpre o mesmo papel de persistir o progresso do jogador.
   Todo o estado fica em memoria (objeto STATE) enquanto o jogo roda.
   ============================================================================ */

/* ============================ DATA.JS (dados fixos) ============================ */
const DATA = {

/* Preenche campos novos em saves antigos, sem apagar nada do progresso existente */
function migrarEstado(s){
  if(!s.noticias) s.noticias=[];
  if(!s.propostas) s.propostas=[];
  if(typeof s.expansionPackInstalado!=="boolean") s.expansionPackInstalado=false;
  if(!s.vendasPorProduto){ s.vendasPorProduto={}; Object.keys(s.menu).forEach(k=>s.vendasPorProduto[k]=0); }
  if(s.expansionPackInstalado){
    DATA.cardapioExpansion.forEach(p=>{ if(!s.menu[p.id]) s.menu[p.id]=Object.assign({},p,{ativo:true}); if(s.vendasPorProduto[p.id]===undefined) s.vendasPorProduto[p.id]=0; });
  }
  s.funcionarios.forEach(f=>{
    if(!f.personalidade) f.personalidade = DATA.personalidades[DATA.personalidades.length-1].id;
    if(!f.dataContratacao) f.dataContratacao = {dia:s.dia, mes:s.mes, ano:s.ano};
  });
  s.concorrentes.forEach((c,i)=>{
    if(!c.logo) c.logo = ["🍔","⚡","🏆","🍟","🌟"][i%5];
    if(!c.estrategia) c.estrategia = "Expansão gradual";
    if(typeof c.popularidade!=="number") c.popularidade = 30+Math.random()*30;
  });
  s.lojas.forEach(l=>{
    if(!l.cidadeRef.anoDisponivel) l.cidadeRef.anoDisponivel=1995;
    if(!l.cidadeRef.paisId) l.cidadeRef.paisId="brasil";
    if(!l.reforma) l.reforma = {fachada:"basica", interior:"simples", mesas:"plastico", extras:[]};
    if(!l.driveThru) l.driveThru = {ativo:false, nivel:0};
    if(typeof l.lucroAcumulado!=="number") l.lucroAcumulado = 0;
  });
  if(!s.empresa.logo) s.empresa.logo = "🍔";
  if(!s.empresa.mascote) s.empresa.mascote = "🐮";
  if(!s.empresa.slogan) s.empresa.slogan = "O melhor sabor da cidade!";
  if(!s.fabricas) s.fabricas = { pao:false, carne:false, batata:false, distribuicao:false };
  if(!s.candidatosEspeciais) s.candidatosEspeciais = [];
  if(!s.promocoesAtivas) s.promocoesAtivas = [];
  if(!s.campanhaCompleta) s.campanhaCompleta = [];
  if(!s.receitasCriadas) s.receitasCriadas = [];
  s.funcionarios.forEach(f=>{ if(f.especial===undefined) f.especial=null; });
}

/* ============================ ECONOMY.JS (simulação diária) ============================ */
function simularDia(){
  const s = STATE;
  let receitaTotal=0, gastoTotal=0;

  // multiplicador de produtividade da equipe (rápido/preguiçoso afetam a capacidade efetiva)
  let equipeMult = 1;
  if(s.funcionarios.length){
    const soma = s.funcionarios.reduce((a,f)=>{
      const perso = DATA.personalidades.find(p=>p.id===f.personalidade) || {velocidadeMult:1,produtividadeMult:1};
      return a + perso.velocidadeMult*perso.produtividadeMult;
    },0);
    equipeMult = soma/s.funcionarios.length;
  }

  // consumo de ingredientes e reposição manual (o jogador compra na tela de estoque)
  s.lojas.forEach(loja=>{
    // clientes possíveis pela reputação, cidade, marketing, competição
    const boostMarketing = s.campanhasAtivas.reduce((a,c)=>a+c.boost,0);
    const basePot = (loja.cidadeRef.populacao/2000) * (loja.cidadeRef.poder);
    let clientesPotenciais = Math.round(basePot * (s.empresa.reputacao/50) * (1+boostMarketing/100));
    clientesPotenciais -= Math.round(clientesPotenciais * (s.mercadoCompeticao/200));
    clientesPotenciais += loja.clientesBonusTemp + s.restaurante.clientesBonusTemp;
    clientesPotenciais = Math.max(0, clientesPotenciais);

    const atendidos = Math.min(Math.round((loja.capacidade + s.eficiencia)*equipeMult), clientesPotenciais);
    loja.clientesHoje = atendidos;
    s.totalClientesAtendidos += atendidos;

    // vendas distribuídas pelo cardápio ativo, ponderado por popularidade
    const itensAtivos = Object.values(s.menu).filter(m=>m.ativo);
    const pesoTotal = itensAtivos.reduce((a,m)=>a+m.popularidade,0)||1;
    itensAtivos.forEach(item=>{
      const qtdVendida = Math.round(atendidos * (item.popularidade/pesoTotal) * 1.3);
      receitaTotal += qtdVendida*item.preco;
      gastoTotal += qtdVendida*item.custo;
      if(s.vendasPorProduto[item.id]===undefined) s.vendasPorProduto[item.id]=0;
      s.vendasPorProduto[item.id] += qtdVendida;
    });

    // desgaste da loja
    loja.limpeza = Math.max(0, loja.limpeza-1);
    loja.esperaMedia = Math.max(1, 8 - Math.round(s.eficiencia/10));
    loja.clientesBonusTemp = Math.max(0, loja.clientesBonusTemp-5);
  });
  s.restaurante.clientesBonusTemp = Math.max(0, s.restaurante.clientesBonusTemp-10);

  // salários e personalidade da equipe
  let bonusCarisma = 0;
  s.funcionarios.forEach(f=>{
    gastoTotal += f.salario/30; // salário mensal ratado por dia
    f.cansaco = Math.min(100, f.cansaco+3);
    f.humor = Math.max(0, f.humor - (f.cansaco>70?2:0));
    if(Math.random()<0.02){ f.experiencia++; f.velocidade=Math.min(100,f.velocidade+2); }
    const perso = DATA.personalidades.find(p=>p.id===f.personalidade);
    if(perso && perso.clientesBonus) bonusCarisma += perso.clientesBonus;
  });
  if(bonusCarisma>0) s.restaurante.clientesBonusTemp += Math.round(bonusCarisma*0.3);

  // aluguel das lojas
  s.lojas.forEach(loja=> gastoTotal += loja.cidadeRef.aluguel/30);

  // impostos simples (8% sobre receita)
  const impostos = receitaTotal*0.08;
  gastoTotal += impostos;

  // campanhas de marketing perdem duração
  s.campanhasAtivas = s.campanhasAtivas.filter(c=>{ c.duracao--; return c.duracao>0; });

  // reputação evolui conforme limpeza/qualidade média
  const limpezaMedia = s.lojas.reduce((a,l)=>a+l.limpeza,0)/s.lojas.length;
  const qualidadeMedia = Object.values(s.menu).reduce((a,m)=>a+m.qualidade,0)/Object.values(s.menu).length;
  let deltaRep = 0;
  if(limpezaMedia<40) deltaRep -= 1;
  if(qualidadeMedia>70) deltaRep += 0.5;
  if(qualidadeMedia<40) deltaRep -= 0.5;
  s.empresa.reputacao = Math.max(0, Math.min(100, s.empresa.reputacao+deltaRep));

  const lucro = receitaTotal-gastoTotal;
  s.empresa.caixa += lucro;
  s.lucroDiaAtual = lucro;
  s.clientesHojeAtual = s.lojas.reduce((a,l)=>a+l.clientesHoje,0);
  s.empresa.historico.push({dia:s.dia,mes:s.mes,ano:s.ano,receita:receitaTotal,gasto:gastoTotal,lucro});
  if(s.empresa.historico.length>200) s.empresa.historico.shift();

  // IA dos concorrentes (mais inteligentes: preço, propaganda, expansão, produtos, roubo de equipe)
  s.concorrentes.forEach(c=>{
    const acao = Math.random();
    if(acao<0.015){ c.lojas++; c.forca+=3; c.estrategia="Expansão agressiva"; adicionarLog(`${c.nome} abriu uma nova loja.`); }
    else if(acao<0.05){ c.forca=Math.min(100,c.forca+2); c.popularidade=Math.min(100,c.popularidade+3); c.estrategia="Redução de preços"; }
    else if(acao<0.09){ c.popularidade=Math.min(100,c.popularidade+5); c.estrategia="Campanha de propaganda"; }
    else if(acao<0.11){ c.estrategia="Lançou produto novo"; c.popularidade=Math.min(100,c.popularidade+2); }
    else if(acao<0.125 && s.funcionarios.length>1){
      const alvo = s.funcionarios[Math.floor(Math.random()*s.funcionarios.length)];
      if(alvo.humor<50){
        s.funcionarios = s.funcionarios.filter(f=>f.id!==alvo.id);
        adicionarLog(`⚠️ ${c.nome} contratou seu funcionário ${alvo.nome} (estava desmotivado).`);
      }
    }
  });
  s.mercadoCompeticao = Math.min(90, s.concorrentes.reduce((a,c)=>a+c.forca+c.popularidade*0.2,0)/s.concorrentes.length*0.5);

  // Jornal da Cidade — nova manchete a cada poucos dias
  if(Math.random()<0.16){
    const noticia = DATA.jornalHeadlines[Math.floor(Math.random()*DATA.jornalHeadlines.length)];
    noticia.efeito(s);
    s.noticias.unshift({texto:noticia.texto, dia:s.dia, mes:s.mes, ano:s.ano});
    if(s.noticias.length>40) s.noticias.pop();
  }

  // Central de comunicação — proposta ocasional aguardando decisão do jogador
  if(Math.random()<0.07 && s.propostas.length<3){
    const tpl = DATA.propostasTemplates[Math.floor(Math.random()*DATA.propostasTemplates.length)];
    s.propostas.push({id:"p_"+Math.random().toString(36).slice(2,8), tipo:tpl.tipo, icone:tpl.icone, texto:tpl.texto, templateIdx:DATA.propostasTemplates.indexOf(tpl)});
    mostrarToast(tpl.icone+" Nova proposta recebida na Central de Comunicação.");
    tocarSom("notificacao");
  }

  // avançar calendário
  s.dia++;
  if(s.dia>30){ s.dia=1; s.mes++; }
  if(s.mes>12){ s.mes=1; s.ano++; }

  // evento aleatório (10% de chance por dia)
  if(Math.random()<0.10){
    const ev = DATA.eventos[Math.floor(Math.random()*DATA.eventos.length)];
    ev.efeito(s);
    adicionarLog("⚡ Evento: "+ev.texto);
  }

  verificarConquistas();
}

function adicionarLog(msg){
  STATE.log.unshift(`[Dia ${STATE.dia}/${STATE.mes}/${STATE.ano}] ${msg}`);
  if(STATE.log.length>60) STATE.log.pop();
  const box=document.getElementById("logbox");
  if(box) renderLog();
}

function verificarConquistas(){
  DATA.conquistas.forEach(c=>{
    if(!STATE.conquistasFeitas.includes(c.id) && c.check(STATE)){
      STATE.conquistasFeitas.push(c.id);
      adicionarLog("🏆 Conquista desbloqueada: "+c.nome);
      mostrarToast("🏆 Conquista: "+c.nome);
    }
  });
}

function mostrarToast(msg){
  const t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.getElementById("desktop").appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

function comprarPesquisa(id){
  const p = DATA.pesquisas.find(x=>x.id===id);
  if(!p || STATE.pesquisasFeitas.includes(id) || STATE.empresa.caixa<p.custo) return;
  if(p.requerExpansao && !STATE.expansionPackInstalado) return;
  STATE.empresa.caixa -= p.custo;
  STATE.pesquisasFeitas.push(id);
  if(p.efeito==="eficiencia") STATE.eficiencia += p.valor;
  if(p.efeito==="capacidade") STATE.lojas.forEach(l=>l.capacidade+=p.valor);
  if(p.efeito==="clientes") STATE.restaurante.clientesBonusTemp += p.valor;
  if(p.efeito==="desperdicio") { /* reduz consumo diário */
    Object.values(STATE.ingredientes).forEach(i=>i.consumoDia=Math.max(1,Math.round(i.consumoDia*(1+p.valor/100))));
  }
  adicionarLog("🔬 Pesquisa concluída: "+p.nome);
  mostrarToast("🔬 Pesquisa concluída: "+p.nome);
  render();
}
function lancarCampanha(id){
  const c = DATA.campanhas.find(x=>x.id===id);
  if(!c || STATE.empresa.caixa<c.custo) return;
  STATE.empresa.caixa -= c.custo;
  STATE.campanhasAtivas.push(Object.assign({},c));
  adicionarLog("📣 Campanha iniciada: "+c.nome);
  render();
}
function abrirNovaLoja(idxCidade){
  const cidade = DATA.cidades[idxCidade];
  const custoAbertura = 3000 + cidade.aluguel*5;
  if(STATE.empresa.caixa<custoAbertura) return;
  STATE.empresa.caixa -= custoAbertura;
  STATE.lojas.push(criarLoja(cidade.nome+" #"+(STATE.lojas.length+1), cidade));
  adicionarLog("🏗️ Nova loja aberta em "+cidade.nome);
  mostrarToast("Nova loja aberta em "+cidade.nome+"!");
  render();
}
function contratarFuncionario(tipo){
  const custoContratacao = 100;
  if(STATE.empresa.caixa<custoContratacao) return;
  STATE.empresa.caixa -= custoContratacao;
  STATE.funcionarios.push(criarFuncionario(tipo));
  adicionarLog("👤 Novo funcionário contratado: "+tipo);
  render();
}
function demitirFuncionario(id){
  STATE.funcionarios = STATE.funcionarios.filter(f=>f.id!==id);
  render();
}
function comprarIngrediente(id, qtd){
  const ing = STATE.ingredientes[id];
  const custo = ing.preco*qtd;
  if(STATE.empresa.caixa<custo) return;
  STATE.empresa.caixa -= custo;
  ing.qtd += qtd;
  render();
}
function melhorarLoja(lojaId, campo){
  const loja = STATE.lojas.find(l=>l.id===lojaId);
  const custos = {limpeza:0, decoracao:150, capacidade:500, eficiencia:200};
  const custo = custos[campo]||100;
  if(STATE.empresa.caixa<custo) return;
  STATE.empresa.caixa -= custo;
  if(campo==="capacidade") loja.capacidade += 10;
  else loja[campo] = Math.min(100, loja[campo]+10);
  render();
}

/* ============================ SONS RETRÔ (Web Audio, sem arquivos externos) ============================ */
let somAtivo = true;
let audioCtx = null;
function tocarSom(tipo){
  if(!somAtivo) return;
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const presets = {
      clique:{freq:600, dur:0.05, type:"square"},
      erro:{freq:140, dur:0.25, type:"sawtooth"},
      inicializacao:{freq:440, dur:0.4, type:"triangle"},
      dinheiro:{freq:880, dur:0.15, type:"square"},
      notificacao:{freq:1000, dur:0.1, type:"sine"},
    };
    const p = presets[tipo]||presets.clique;
    o.type = p.type; o.frequency.value = p.freq;
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+p.dur);
    o.start(); o.stop(audioCtx.currentTime+p.dur);
  }catch(e){ /* áudio indisponível — ignora silenciosamente */ }
}

/* ============================ MINI-JOGOS ============================ */
let minigameEstado = { pontos:0, ativo:false, timer:null };
function iniciarMinigame(tipo){
  const area = document.getElementById("minigameArea");
  const placar = document.getElementById("minigamePlacar");
  if(!area) return;
  area.innerHTML=""; minigameEstado.pontos=0; minigameEstado.ativo=true;
  placar.textContent = "Pontos: 0 (15s)";
  let tempo = 15;
  const emojis = {caixa:"💵", montagem:"🍔", limpeza:"🧽"};
  function spawn(){
    if(!minigameEstado.ativo) return;
    const alvo = document.createElement("div");
    alvo.className="minigame-target";
    alvo.textContent = emojis[tipo]||"⭐";
    alvo.style.left = Math.random()*85+"%";
    alvo.style.top = Math.random()*80+"%";
    alvo.addEventListener("click", ()=>{
      minigameEstado.pontos++;
      placar.textContent = "Pontos: "+minigameEstado.pontos+" ("+tempo+"s)";
      alvo.remove();
      tocarSom("dinheiro");
      spawn();
    });
    area.appendChild(alvo);
  }
  spawn();
  const contagem = setInterval(()=>{
    tempo--;
    placar.textContent = "Pontos: "+minigameEstado.pontos+" ("+tempo+"s)";
    if(tempo<=0){
      clearInterval(contagem);
      minigameEstado.ativo=false;
      area.innerHTML = "<div style='padding:20px;text-align:center;'>Fim de jogo! Pontuação: "+minigameEstado.pontos+"</div>";
      const recompensa = minigameEstado.pontos*15;
      STATE.empresa.caixa += recompensa;
      adicionarLog(`🎮 Minijogo concluído (${tipo}): +${fmtMoney(recompensa)} de bônus.`);
      mostrarToast("Minijogo concluído! +"+fmtMoney(recompensa));
      render();
    }
  },1000);
}

let openWindows = {}; // id -> {el, minimized}
let zTop = 20;

function abrirJanela(id){
  tocarSom("clique");
  if(openWindows[id]){
    trazerFrente(id);
    return;
  }
  const def = windowDefs[id];
  const el = document.createElement("div");
  el.className="window";
  el.style.left = (60+Object.keys(openWindows).length*24)+"px";
  el.style.top = (60+Object.keys(openWindows).length*20)+"px";
  el.style.width = "480px";
  el.style.height = "420px";
  el.style.zIndex = ++zTop;
  el.innerHTML = `
    <div class="titlebar" data-id="${id}">
      <span class="ticon">${def.icon}</span><span>${def.titulo}</span>
      <div class="tclose" data-close="${id}">✕</div>
    </div>
    <div class="win-body" id="body_${id}"></div>
  `;
  document.getElementById("windowsLayer").appendChild(el);
  openWindows[id] = {el};
  tornarArrastavel(el);
  el.querySelector("[data-close]").addEventListener("click", ()=>fecharJanela(id));
  el.addEventListener("mousedown", ()=>trazerFrente(id));
  atualizarTaskbar();
  renderJanela(id);
}
function fecharJanela(id){
  if(!openWindows[id]) return;
  openWindows[id].el.remove();
  delete openWindows[id];
  atualizarTaskbar();
}
function trazerFrente(id){
  if(!openWindows[id]) return;
  openWindows[id].el.style.zIndex = ++zTop;
}
function tornarArrastavel(el){
  const bar = el.querySelector(".titlebar");
  let dragging=false, ox=0, oy=0;
  bar.addEventListener("mousedown", e=>{
    dragging=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop;
    trazerFrente(bar.dataset.id);
  });
  window.addEventListener("mousemove", e=>{
    if(!dragging) return;
    el.style.left = Math.max(0, e.clientX-ox)+"px";
    el.style.top = Math.max(46, e.clientY-oy)+"px";
  });
  window.addEventListener("mouseup", ()=>dragging=false);
}
function atualizarTaskbar(){
  const box = document.getElementById("taskbarItems");
  box.innerHTML="";
  Object.keys(openWindows).forEach(id=>{
    const b=document.createElement("button");
    b.className="win95 taskbtn";
    b.textContent = windowDefs[id].icon+" "+windowDefs[id].titulo.replace(/^\S+\s/,"");
    b.addEventListener("click", ()=>trazerFrente(id));
    box.appendChild(b);
  });
}

function desenharGrafico(hist){
  const cv = document.getElementById("chartLucro");
  if(!cv) return;
  const ctx = cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  if(hist.length<2) return;
  const max = Math.max(...hist.map(h=>h.lucro), 1);
  const min = Math.min(...hist.map(h=>h.lucro), 0);
  const range = (max-min)||1;
  ctx.strokeStyle="#000080"; ctx.lineWidth=2; ctx.beginPath();
  hist.forEach((h,i)=>{
    const x = (i/(hist.length-1))*(cv.width-10)+5;
    const y = cv.height-10 - ((h.lucro-min)/range)*(cv.height-20);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  // linha zero
  const yZero = cv.height-10 - ((0-min)/range)*(cv.height-20);
  ctx.strokeStyle="#808080"; ctx.setLineDash([2,2]);
  ctx.beginPath(); ctx.moveTo(0,yZero); ctx.lineTo(cv.width,yZero); ctx.stroke();
  ctx.setLineDash([]);
}

function desenharGraficoGenerico(canvasId, hist){
  const cv = document.getElementById(canvasId);
  if(!cv) return;
  const ctx = cv.getContext("2d");
  ctx.clearRect(0,0,cv.width,cv.height);
  if(hist.length<2) return;
  const maxR = Math.max(...hist.map(h=>h.receita), 1);
  const maxL = Math.max(...hist.map(h=>h.lucro), 1);
  const minL = Math.min(...hist.map(h=>h.lucro), 0);
  const range = (Math.max(maxR,maxL)-minL)||1;
  function linha(campo, cor){
    ctx.strokeStyle=cor; ctx.lineWidth=2; ctx.beginPath();
    hist.forEach((h,i)=>{
      const x = (i/(hist.length-1))*(cv.width-10)+5;
      const y = cv.height-10 - ((h[campo]-minL)/range)*(cv.height-20);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }
  linha("receita","#006400");
  linha("lucro","#000080");
  ctx.fillStyle="#006400"; ctx.font="10px sans-serif"; ctx.fillText("Receita",6,12);
  ctx.fillStyle="#000080"; ctx.fillText("Lucro",6,24);
}

function fmtMoney(v){ return "$"+v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ============================ SAVE.JS (export/import JSON, sem localStorage) ============================ */
function exportarSave(){
  const blob = new Blob([JSON.stringify(STATE,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download = `fastfoodtycoon_save_${STATE.empresa.nome.replace(/\s+/g,"_")}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  mostrarToast("💾 Jogo salvo (arquivo JSON baixado).");
}
function importarSave(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const novo = JSON.parse(e.target.result);
      STATE = novo;
      migrarEstado(STATE);
      mostrarToast("📂 Save carregado com sucesso!");
      tocarSom("notificacao");
      render();
      renderLog();
    }catch(err){
      mostrarToast("Erro ao carregar o arquivo de save.");
      tocarSom("erro");
    }
  };
  reader.readAsText(file);
}

/* ============================ LOOP PRINCIPAL ============================ */
function gameLoop(){
  if(!paused && speed>0 && STATE){
    tickAccum += 16;
    const intervalo = TICK_MS/speed;
    if(tickAccum>=intervalo){
      tickAccum=0;
      simularDia();
      render();
    }
  }
  requestAnimationFrame(gameLoop);
}
